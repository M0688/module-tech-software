<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Module Tech Software</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ===================== LOGIN ===================== -->
  <div id="login-screen" class="login-screen">
    <form id="login-form" class="login-card">
      <img class="login-logo" src="assets/logo.png" alt="Module Tech — Car Remapping & Performance" />
      <label>Email
        <input type="email" id="login-email" autocomplete="username" required />
      </label>
      <label>Password
        <input type="password" id="login-password" autocomplete="current-password" required />
      </label>
      <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign in</button>
      <p class="login-error" id="login-error"></p>
    </form>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <img class="sidebar-logo" src="assets/logo.png" alt="Module Tech" />
      <nav class="nav">
        <a href="#dashboard" class="nav-link" data-view="dashboard">Dashboard</a>
        <a href="#jobs" class="nav-link" data-view="jobs">Jobs</a>
        <a href="#customers" class="nav-link" data-view="customers">Customers</a>
        <a href="#vehicles" class="nav-link" data-view="vehicles">Vehicles</a>
        <a href="#reports" class="nav-link" data-view="reports">Reports</a>
        <a href="#diagnostics" class="nav-link" data-view="diagnostics">Diagnostics</a>
        <a href="#settings" class="nav-link" data-view="settings">Settings</a>
      </nav>
      <div class="sidebar-footer">
        <span id="user-email" class="user-email"></span>
        <button class="btn btn-ghost btn-sm" id="password-btn">Change password</button>
        <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
      </div>
    </aside>

    <main class="main">
      <div id="view" class="view"><!-- views render here --></div>
    </main>
  </div>

  <!-- ===================== MODAL ===================== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Title</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
